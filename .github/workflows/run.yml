name: Run Trading Bot

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          PYTHONUNBUFFERED: "1"

      - uses: actions/upload-artifact@v4
        with:
          name: options-results
          path: output/
